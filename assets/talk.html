<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Talk to a tree</title>
  <style>
    :root {
      --bg: #f4f1e8;
      --bg-2: #ebe6d6;
      --panel: #ffffff;
      --ink: #21302a;
      --muted: #6c7a72;
      --line: #d9d4c2;
      --accent: #3f7a55;
      --accent-soft: #d8e7dd;
      --bubble-tree: #eef3eb;
      --bubble-you: #3f7a55;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14191a;
        --bg-2: #1a2120;
        --panel: #1d2624;
        --ink: #e9efeb;
        --muted: #8fa195;
        --line: #2a3531;
        --accent: #6fbf8a;
        --accent-soft: #243b30;
        --bubble-tree: #243027;
        --bubble-you: #3f7a55;
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 18px 18px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    header .row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--accent-soft);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .avatar svg { width: 22px; height: 22px; color: var(--accent); }
    header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    header .who { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .summary {
      margin-top: 12px;
      padding: 12px 14px;
      background: var(--bg-2);
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--ink);
    }
    .summary .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-right: 6px;
      vertical-align: 1px;
    }
    .summary.loading { opacity: 0.6; font-style: italic; }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.tree {
      background: var(--bubble-tree);
      color: var(--ink);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.you {
      background: var(--bubble-you);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.typing {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 12px 14px;
    }
    .msg.typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .msg.typing span:nth-child(2) { animation-delay: 0.15s; }
    .msg.typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    form {
      padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
      background: var(--panel);
      border-top: 1px solid var(--line);
      display: flex;
      gap: 8px;
    }
    input[type=text] {
      flex: 1;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      -webkit-appearance: none;
    }
    input[type=text]:focus { border-color: var(--accent); }
    button {
      padding: 0 18px;
      font-size: 15px;
      font-weight: 600;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <div class="row">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2c3 2.5 4 5 4 7a4 4 0 0 1-3 3.9V22"/>
          <path d="M12 2c-3 2.5-4 5-4 7a4 4 0 0 0 3 3.9"/>
          <path d="M9 22h6"/>
        </svg>
      </div>
      <div>
        <h1>Talk to your tree</h1>
        <div class="who" id="who">connecting…</div>
      </div>
    </div>
    <div class="summary loading" id="summary">Listening for sensor data…</div>
  </header>

  <main id="log">
    <div class="msg tree" id="greet">Hi. Ask me anything — about the weather, my neighbors, or how I'm doing.</div>
  </main>

  <form id="form" autocomplete="off">
    <input type="text" id="q" placeholder="How are you today?" required maxlength="200" />
    <button type="submit" id="send">Send</button>
  </form>

  <script>
    const params = new URLSearchParams(location.search);
    const wantedId = params.get("tree_id");

    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("q");
    const send = document.getElementById("send");

    function band(s) {
      if (s >= 70) return { word: "stressed", note: "could really use some attention" };
      if (s >= 40) return { word: "okay", note: "but worth keeping an eye on" };
      return { word: "doing well", note: "leaves and roots both happy" };
    }

    function renderSummary(state) {
      const el = document.getElementById("summary");
      const who = document.getElementById("who");
      const b = band(state.stress_index);
      const label = state.vision.label.replace(/_/g, " ");
      el.classList.remove("loading");
      el.innerHTML =
        `<span class="badge">${state.tree_id}</span>` +
        `I'm in <strong>${state.location}</strong>. Right now I'm <strong>${b.word}</strong> — ` +
        `${state.stress_index}/100, ${state.sensors.temp_c.toFixed(1)}°C, ` +
        `vision reading: ${label}. ${b.note}.`;
      who.textContent = state.tree_id + " · " + state.location;
    }

    async function loadState() {
      try {
        const r = await fetch("/state", { cache: "no-store" });
        if (!r.ok) throw new Error("state");
        const s = await r.json();
        if (wantedId && s.tree_id !== wantedId) {
          // Backend currently exposes one active tree at a time. Show what
          // we have and note the requested tree.
          renderSummary(s);
          document.getElementById("who").textContent =
            `${s.tree_id} (you scanned ${wantedId})`;
        } else {
          renderSummary(s);
        }
      } catch (e) {
        document.getElementById("summary").textContent =
          "I can't reach my sensors right now — but I can still chat.";
        document.getElementById("summary").classList.remove("loading");
      }
    }

    function addMsg(text, who) {
      const el = document.createElement("div");
      el.className = "msg " + who;
      el.textContent = text;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el;
    }

    function addTyping() {
      const el = document.createElement("div");
      el.className = "msg tree typing";
      el.innerHTML = "<span></span><span></span><span></span>";
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el;
    }

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      input.value = "";
      send.disabled = true;
      addMsg(q, "you");
      const typing = addTyping();
      try {
        const r = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q }),
        });
        const data = await r.json();
        typing.remove();
        if (data.answer) {
          addMsg(data.answer, "tree");
          if (data.state) renderSummary(data.state);
        } else {
          addMsg("Hmm, I couldn't quite hear that. Try again?", "tree");
        }
      } catch (e) {
        typing.remove();
        addMsg("My connection rustled. Try again in a moment.", "tree");
      } finally {
        send.disabled = false;
        input.focus();
      }
    });

    loadState();
  </script>
</body>
</html>
